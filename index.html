<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive RH Consulting - Liens</title>
  <meta name="description" content="Accédez rapidement au site web, Instagram et LinkedIn de Rive RH Consulting. Vos RH, notre métier, votre sérénité.">
  <meta name="theme-color" content="#2A1B11">
  
  <style>
    :root {
      --pale-silver: #CBC4B2;
      --lavender-gray: #C1CBD5;
      --zinnwaldite: #2A1B11;
      --chinese-white: #E7E7DD;
      --ruddy-brown: #BA5428;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--chinese-white);
      color: var(--zinnwaldite);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 50px 30px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(42, 27, 17, 0.08);
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--lavender-gray);
    }
    .logo {
      width: 180px;
      margin: 0 auto 30px auto;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .tagline {
      color: var(--zinnwaldite);
      opacity: 0.7;
      margin: 0 0 35px 0;
      font-size: 15px;
      letter-spacing: 0.5px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--zinnwaldite);
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 14px;
      margin: 14px 0;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--ruddy-brown);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(186, 84, 40, 0.25);
    }
    .btn:active {
      transform: translateY(0);
    }
    .social-row {
      display: flex;
      gap: 14px;
      margin: 14px 0;
    }
    .btn-icon {
      flex: 1;
      background: white;
      border: 2px solid var(--lavender-gray);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .icône btn:survivaliste {
      couleurur de la bordure: var(--brun roux);
      arrière-plan: var(--chinois-blanc);
      transformateur: traîneau(-2px);
    }
    .icône btn:actif {
      transformateur: traîneau(0);
    }
    .icône btn svg {
      largeur: 32px;
      hauteur: 32px;
    }
    tarte de page {
      marge supérieure: 40px;
      taille de la police: 13px;
      couleurur: var(--argent pâle);
    }
  </style>
  <script compositeur de données="https://rive-rh.goatcounter.com/count" asynchrone source="//gc.zgo.at/count.js"></script>
</tête>
