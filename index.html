<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive RH Consulting - Liens</title>
  <style>
    :root {
      --pale-silver: #CBC4B2;
      --lavender-gray: #C1CBD5;
      --zinnwaldite: #2A1B11;
      --chinese-white: #E7E7DD;
      --ruddy-brown: #BA5428;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--chinese-white);
      color: var(--zinnwaldite);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 50px 30px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(42, 27, 17, 0.08);
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--lavender-gray);
    }
    .logo {
      width: 180px;
      margin: 0 auto 30px auto;
    }
    .logo img {
      width: 100%;
      height: auto;
    }
    .tagline {
      color: var(--zinnwaldite);
      opacity: 0.7;
      margin: 0 0 35px 0;
      font-size: 15px;
    }
    .btn {
      display: block;
      background: var(--zinnwaldite);
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 14px;
      margin: 14px 0;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: var(--ruddy-brown);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(186, 84, 40, 0.25);
    }
    .btn-secondary {
      background: white;
      color: var(--zinnwaldite);
      border: 2px solid var(--lavender-gray);
    }
    .btn-secondary:hover {
      background: var(--chinese-white);
      border-color: var(--ruddy-brown);
      color: var(--ruddy-brown);
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--pale-silver);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Rive RH Consulting">
    </div>
    <p class="tagline">Vos RH, notre métier, votre sérénité.</p>
    
    <a href="https://www.riverh.ch" class="btn">Notre site web</a>
    <a href="https://www.instagram.com/riverhconsulting/" class="btn btn-secondary">Instagram</a>
    <a href="https://www.linkedin.com/company/rive-rh/" class="btn btn-secondary">LinkedIn</a>
    
    <footer>© 2026 Rive RH Consulting</footer>
  </div>
</body>
</html>
