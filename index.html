<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive RH Consulting - Liens</title>
  <style>
    :root {
      --pale-silver: #CBC4B2;
      --lavender-gray: #C1CBD5;
      --zinnwaldite: #2A1B11;
      --chinese-white: #E7E7DD;
      --ruddy-brown: #BA5428;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--chinese-white);
      color: var(--zinnwaldite);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 50px 30px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(42, 27, 17, 0.08);
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--lavender-gray);
    }
    .logo {
      width: 180px;
      margin: 0 auto 30px auto;
    }
    .logo img {
      width: 100%;
      height: auto;
    }
    .tagline {
      color: var(--zinnwaldite);
      opacity: 0.7;
      margin: 0 0 35px 0;
      font-size: 15px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--zinnwaldite);
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 14px;
      margin: 14px 0;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: var(--ruddy-brown);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(186, 84, 40, 0.25);
    }
    .social-row {
      display: flex;
      gap: 14px;
      margin: 14px 0;
    }
    .btn-icon {
      flex: 1;
      background: white;
      border: 2px solid var(--lavender-gray);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .btn-icon:hover {
      border-color: var(--ruddy-brown);
      background: var(--chinese-white);
      transform: translateY(-2px);
    }
    .btn-icon svg {
      width: 32px;
      height: 32px;
    }
    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--pale-silver);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Rive RH Consulting">
    </div>
    <p class="tagline">VOS RH, NOTRE MÉTIER, VOTRE SÉRÉNITÉ.</p>
    
    <a href="https://www.riverh.ch" class="btn">Notre site web</a>
    
    <div class="social-row">
      <a href="https://www.instagram.com/riverhconsulting/" class="btn-icon" aria-label="Instagram">
        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="instaGradient" x1="0" x2="1" y1="1" y2="0">
              <stop offset="0" stop-color="#FFD600"/>
              <stop offset="0.2" stop-color="#FF7A00"/>
              <stop offset="0.5" stop-color="#FF0069"/>
              <stop offset="0.75" stop-color="#D300C5"/>
              <stop offset="1" stop-color="#7638FA"/>
            </linearGradient>
          </defs>
          <rect width="256" height="256" rx="55" ry="55" fill="url(#instaGradient)"/>
          <g fill="none" stroke="#fff" stroke-width="16">
            <rect x="64" y="64" width="128" height="128" rx="28" ry="28"/>
            <circle cx="128" cy="128" r="30"/>
            <circle cx="172" cy="84" r="8" fill="#fff" stroke="none"/>
          </g>
        </svg>
      </a>
      
      <a href="https://www.linkedin.com/company/rive-rh/" class="btn-icon" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#0A66C2" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
    
    <footer>© 2026 Rive RH Consulting</footer>
  </div>
</body>
</html>
