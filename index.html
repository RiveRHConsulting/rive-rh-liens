<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive RH Consulting - Liens</title>
  <meta name="description" content="Accédez rapidement au site web, Instagram et LinkedIn de Rive RH Consulting. Vos RH, notre métier, votre sérénité.">
  <meta name="theme-color" content="#2A1B11" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#2A1B11" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">

  <style>
    :root {
      --pale-silver: #CBC4B2;
      --lavender-gray: #C1CBD5;
      --zinnwaldite: #2A1B11;
      --chinese-white: #E7E7DD;
      --ruddy-brown: #BA5428;
      
      /* Thème clair par défaut */
      --bg-page: var(--chinese-white);
      --bg-card: #FFFFFF;
      --text-primary: var(--zinnwaldite);
      --text-secondary: var(--zinnwaldite);
      --border-color: var(--lavender-gray);
      --footer-color: var(--pale-silver);
      --btn-primary-bg: var(--zinnwaldite);
      --btn-primary-text: #FFFFFF;
      --btn-secondary-bg: #FFFFFF;
      --shadow: rgba(42, 27, 17, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Thème sombre Rive RH */
        --bg-page: #1A120C;
        --bg-card: #3A2B21;
        --text-primary: var(--chinese-white);
        --text-secondary: var(--pale-silver);
        --border-color: #4A3B31;
        --footer-color: #6B5A4A;
        --btn-primary-bg: var(--chinese-white);
        --btn-primary-text: var(--zinnwaldite);
        --btn-secondary-bg: #3A2B21;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      background: var(--bg-card);
      padding: 50px 30px;
      border-radius: 24px;
      box-shadow: 0 8px 30px var(--shadow);
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border-color);
      transition: background 0.3s ease, border 0.3s ease;
    }

    .logo {
      width: 180px;
      margin: 0 auto 30px auto;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(11%) sepia(8%) saturate(1234%) hue-rotate(346deg) brightness(95%) contrast(91%);
    }

    @media (prefers-color-scheme: dark) {
      .logo img {
        filter: brightness(0) saturate(100%) invert(91%) sepia(8%) saturate(247%) hue-rotate(21deg) brightness(102%) contrast(92%);
      }
    }

    .tagline {
      color: var(--text-secondary);
      opacity: 0.7;
      margin: 0 35px 35px;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      text-decoration: none;
      padding: 18px;
      border-radius: 14px;
      margin: 14px 0;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn:hover {
      background: var(--ruddy-brown);
      color: #FFFFFF;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(186, 84, 40, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--text-primary);
      border: 2px solid var(--border-color);
    }

    .btn-secondary:hover {
      border-color: var(--ruddy-brown);
      background: var(--bg-page);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .social-row {
      display: flex;
      gap: 14px;
      margin: 14px 0;
    }

    .btn-icon {
      flex: 1;
      background: var(--btn-secondary-bg);
      border: 2px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-icon:hover {
      border-color: var(--ruddy-brown);
      background: var(--bg-page);
      transform: translateY(-2px);
    }

    .btn-icon:active {
      transform: translateY(0);
    }

    .btn-icon svg {
      width: 32px;
      height: 32px;
    }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--footer-color);
    }
  </style>

  <script
    defer
    src="https://umami.rive-rh.ch/script.js"
    data-website-id="adc14e2a-0f39-425c-83b8-1b6232f9d059"
  ></script>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Rive RH Consulting" loading="lazy">
    </div>

    <p class="tagline">VOS RH, NOTRE MÉTIER, VOTRE SÉRÉNITÉ.</p>

    <a
      href="https://www.riverh.ch"
      class="btn"
      onclick="window.umami && window.umami.track('click_site_web')"
      rel="noopener noreferrer"
      target="_blank"
    >Notre site web</a>

    <div class="social-row">
      <a
        href="https://www.instagram.com/riverhconsulting/" 
        class="btn-icon"
        aria-label="Instagram"
        onclick="window.umami && window.umami.track('click_instagram')"
        rel="noopener noreferrer"
        target="_blank"
      >
        <svg aria-hidden="true" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="instaGradient" x1="0" x2="1" y1="1" y2="0">
              <stop offset="0" stop-color="#FFD600"/>
              <stop offset="0.2" stop-color="#FF7A00"/>
              <stop offset="0.5" stop-color="#FF0069"/>
              <stop offset="0.75" stop-color="#D300C5"/>
              <stop offset="1" stop-color="#7638FA"/>
            </linearGradient>
          </defs>
          <rect width="256" height="256" rx="55" ry="55" fill="url(#instaGradient)"/>
          <g fill="none" stroke="#fff" stroke-width="16">
            <rect x="64" y="64" width="128" height="128" rx="28" ry="28"/>
            <circle cx="128" cy="128" r="30"/>
            <circle cx="172" cy="84" r="8" fill="#fff" stroke="none"/>
          </g>
        </svg>
      </a>

      <a
        href="https://www.linkedin.com/company/rive-rh/"
        class="btn-icon"
        aria-label="LinkedIn"
        onclick="window.umami && window.umami.track('click_linkedin')"
        rel="noopener noreferrer"
        target="_blank"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#0A66C2" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>

    <a
      href="rive-rh.vcf"
      class="btn btn-secondary"
      onclick="window.umami && window.umami.track('click_vcard')"
      download="RiveRH-Consulting.vcf"
    >
      Ajouter aux contacts
    </a>

    <footer>© 2026 Rive RH Consulting</footer>
  </div>
</body>
</html>
