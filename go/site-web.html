<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Redirection...</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="1;url=https://www.riverh.ch">

  <script>
    window.goatcounter = {
      no_onload: true
    };
  </script>

  <script
    data-goatcounter="https://rive-rh.goatcounter.com/count"
    async
    src="https://gc.zgo.at/count.js">
  </script>

  <script>
    function redirectNow() {
      window.location.replace("https://www.riverh.ch");
    }

    function sendEventAndRedirect() {
      try {
        if (window.goatcounter && typeof window.goatcounter.count === "function") {
          window.goatcounter.count({
            path: "site-web",
            title: "Site web",
            event: true,
            no_session: true
          });
        } else {
          (new Image()).src =
            "https://rive-rh.goatcounter.com/count?p=site-web&t=Site%20web&e=true&no_session=true&rand=" + Date.now();
        }
      } catch (e) {
        /* ignore */
      }

      setTimeout(redirectNow, 180);
    }

    window.addEventListener("load", function () {
      setTimeout(sendEventAndRedirect, 50);
    });
  </script>
</head>
<body>
</body>
</html>
